services:
  - type: web
    name: rifa-premium
    env: node
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: PAYMENT_SECRET_KEY
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: NODE_ENV
        value: production